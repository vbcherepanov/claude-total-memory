name: Test (PR fast feedback)

# Quick PR feedback loop: split unit vs integration tests on Ubuntu + py3.13
# so developers see red/green in under ~5 minutes.
#
# The full 3-OS * 3-Python matrix lives in ci.yml.
on:
  pull_request:
    branches: [main]

concurrency:
  group: test-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "1"
  INSTALL_TEST_MODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"

jobs:
  unit:
    name: Unit tests (fast, parallel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/fastembed
          key: models-ubuntu-3.13-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-dev.txt
          pip install pytest-timeout pytest-xdist

      # Split: "integration" lives in tests/test_integration_*.py plus the
      # handful of *_full_integration / *_smoke names. The rest is unit.
      - name: Run unit tests (not integration)
        run: |
          pytest tests/ \
            --timeout=30 \
            -n auto \
            -q \
            --ignore-glob='tests/test_integration_*.py' \
            --ignore=tests/test_reflection_full_integration.py \
            --ignore=tests/test_dashboard_http_smoke.py \
            --ignore=tests/test_e2e_v8_workflow.py

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Cache model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/fastembed
          key: models-ubuntu-3.13-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-dev.txt
          pip install pytest-timeout

      - name: Run integration tests
        run: |
          pytest \
            --timeout=120 \
            -v \
            tests/test_integration_*.py \
            tests/test_reflection_full_integration.py \
            tests/test_dashboard_http_smoke.py \
            tests/test_e2e_v8_workflow.py
